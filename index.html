<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Fortune</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎡 Wheel of Fortune</h1>

    <button id="spinButton">
        Spin
    </button>

    <div class="card">

        <h2>Activity</h2>
        <p id="activity">-</p>

        <h2>Duration</h2>
        <p id="duration">-</p>

    </div>

    <blockquote id="quote">
        "Ready?"
    </blockquote>

    <div class="buttons">

        <button id="acceptButton">
            Accept
        </button>

        <button id="rerollButton">
            Reroll
        </button>

    </div>

    <p id="rerolls">
        Rerolls left: 3
    </p>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
